name: Generate Project Badges

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/scripts/generate-project-badges.mjs"
      - ".github/workflows/project-badges.yml"

jobs:
  project-badges:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate badges
        run: node .github/scripts/generate-project-badges.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Commit badge updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges
          git diff --staged --quiet && exit 0
          git commit -m "Update project badges"
          git push
